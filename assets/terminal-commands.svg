<svg xmlns="http://www.w3.org/2000/svg" width="680" height="280" viewBox="0 0 680 280">
  <defs>
    <style>
      .bg { fill: #1a1b26; }
      .bar { fill: #24253a; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .title { fill: #787c99; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; }
      .cmd { fill: #7aa2f7; font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; }
      .desc { fill: #787c99; font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; }
      .sep { fill: #3b3d57; }
    </style>
  </defs>
  <rect class="bg" width="680" height="280" rx="10"/>
  <rect class="bar" width="680" height="36" rx="10"/>
  <rect class="bar" y="26" width="680" height="10"/>
  <circle class="dot-r" cx="20" cy="18" r="6"/>
  <circle class="dot-y" cx="40" cy="18" r="6"/>
  <circle class="dot-g" cx="60" cy="18" r="6"/>
  <text class="title" x="340" y="22" text-anchor="middle">Commands</text>

  <text class="cmd" x="30" y="68">/lwd:start</text>
  <text class="desc" x="240" y="68">Start teaching mode + open dashboard</text>
  <rect class="sep" x="30" y="78" width="620" height="1"/>

  <text class="cmd" x="30" y="100">/lwd:stop</text>
  <text class="desc" x="240" y="100">Pause teaching</text>
  <rect class="sep" x="30" y="110" width="620" height="1"/>

  <text class="cmd" x="30" y="132">/lwd:set depth 3</text>
  <text class="desc" x="240" y="132">Set detail level (1-3)</text>
  <rect class="sep" x="30" y="142" width="620" height="1"/>

  <text class="cmd" x="30" y="164">/lwd:set lang zh</text>
  <text class="desc" x="240" y="164">Switch language (zh/en/ja/auto)</text>
  <rect class="sep" x="30" y="174" width="620" height="1"/>

  <text class="cmd" x="30" y="196">/lwd:try</text>
  <text class="desc" x="240" y="196">Trigger a practice exercise</text>
  <rect class="sep" x="30" y="206" width="620" height="1"/>

  <text class="cmd" x="30" y="228">/lwd:status</text>
  <text class="desc" x="240" y="228">View progress + skill tree</text>
  <rect class="sep" x="30" y="238" width="620" height="1"/>

  <text class="cmd" x="30" y="260">/lwd:reset</text>
  <text class="desc" x="240" y="260">Start fresh</text>
</svg>
