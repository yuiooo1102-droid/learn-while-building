<svg xmlns="http://www.w3.org/2000/svg" width="680" height="180" viewBox="0 0 680 180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .bg { fill: #1a1b26; rx: 10; }
      .bar { fill: #24253a; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .title { fill: #787c99; font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 12px; }
      .prompt { fill: #7aa2f7; font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 13px; }
      .cmd { fill: #c0caf5; font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 13px; }
      .comment { fill: #565f89; font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 13px; }
      .flag { fill: #bb9af7; font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 13px; }
      .arg { fill: #9ece6a; font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 13px; }
    </style>
  </defs>
  <rect class="bg" width="680" height="180" rx="10"/>
  <rect class="bar" width="680" height="36" rx="10"/>
  <rect class="bar" y="26" width="680" height="10"/>
  <circle class="dot-r" cx="20" cy="18" r="6"/>
  <circle class="dot-y" cx="40" cy="18" r="6"/>
  <circle class="dot-g" cx="60" cy="18" r="6"/>
  <text class="title" x="340" y="22" text-anchor="middle">Terminal</text>
  <text class="prompt" x="20" y="68">$</text>
  <text class="cmd" x="36" y="68">claude plugins marketplace add</text>
  <text class="arg" x="356" y="68">yuiooo1102-droid/learn-while-building</text>
  <text class="prompt" x="20" y="98">$</text>
  <text class="cmd" x="36" y="98">claude plugins install</text>
  <text class="arg" x="226" y="98">lwd@learn-while-building</text>
  <text class="prompt" x="20" y="138">$</text>
  <text class="cmd" x="36" y="138">/lwd:start</text>
  <text class="comment" x="160" y="138"># That's it. Dashboard opens in your browser.</text>
</svg>
